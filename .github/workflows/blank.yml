# AI Stock Scan v2
name: AI Stock Scan

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Packages
        run: |
          pip install yfinance pandas numpy requests scikit-learn

      - name: Run Stock Scan
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python stock_scan.py

      - name: Commit History
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add train_data.csv || true
          git add model.pkl || true
          git add prediction_history.csv || true

          git commit -m "Update AI data" || echo "No changes"

          git push
